<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS Error Test</title>
  <script>
    window.errors = [];
    window.onerror = function(msg, url, line, col, error) {
      var errMsg = msg + " at " + url + ":" + line + ":" + col;
      window.errors.push(errMsg);
      // Try to send immediately in case it crashes
      fetch('http://localhost:8081/error', {
        method: 'POST',
        body: JSON.stringify({ type: 'error', message: errMsg })
      }).catch(function(){});
      return false;
    };
  </script>
  <script src="slides_data.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="status">Testing...</div>
  <div id="error-output"></div>
  <script>
    setTimeout(function() {
      var statusDiv = document.getElementById('status');
      var outputDiv = document.getElementById('error-output');
      var result = "";
      if (window.errors.length > 0) {
        result = "FAILED: " + window.errors.join("\n");
      } else {
        result = "SUCCESS. slides count: " + (typeof slides !== 'undefined' ? slides.length : 'undefined');
      }
      statusDiv.innerHTML = result;
      fetch('http://localhost:8081/done', {
        method: 'POST',
        body: JSON.stringify({ type: 'done', message: result })
      }).catch(function(){});
    }, 1000);
  </script>
</body>
</html>
